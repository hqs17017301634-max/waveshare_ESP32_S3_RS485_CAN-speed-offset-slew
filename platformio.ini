; ESP32-FSD — CAN-only build for Waveshare ESP32-S3-RS485-CAN (16MB flash).
; No WiFi / Bluetooth / OTA / dashboard. Only stable CAN + FSD activation + speed control.

[platformio]
src_dir = ESP32S3CAN-FSD

[env:waveshare_ESP32_S3_RS485_CAN]
platform  = espressif32
board     = esp32s3box
framework = arduino

board_build.flash_size = 16MB
; Single-app, no-OTA partition table — radios/network features are stripped.
board_build.partitions = huge_app.csv

build_flags =
    -DTWAI_TX_PIN=GPIO_NUM_15
    -DTWAI_RX_PIN=GPIO_NUM_16
    -DPIN_LED=14
    -DTWAI_RX_QUEUE_LEN=64
    -DTWAI_TX_QUEUE_LEN=16
    -std=gnu++17
build_unflags = -std=gnu++11

monitor_speed = 115200

; ---------------------------------------------------------------------------
; LILYGO T-2CAN — dual CAN.
;   CAN A / CAN1 : ESP32-S3 native TWAI, GPIO7(TX)/GPIO6(RX), X197 Pin 13/14.
;                  Carries FSD activation + speed-limit modification (unchanged).
;   CAN B / CAN2 : MCP2515 over SPI, second auxiliary bus, X197/X179 Pin 9/10.
; ---------------------------------------------------------------------------
[env:lilygo_t2can_arduino]
platform  = espressif32
board     = esp32s3box
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = huge_app.csv

lib_deps =
    autowp/autowp-mcp2515

build_flags =
    -DTWAI_TX_PIN=GPIO_NUM_7
    -DTWAI_RX_PIN=GPIO_NUM_6
    -DPIN_LED=2
    -DTWAI_RX_QUEUE_LEN=64
    -DTWAI_TX_QUEUE_LEN=16
    -DLILYGO_T2CAN
    -DENABLE_CANB_MCP2515
    -DMCP2515_SCK=12
    -DMCP2515_MOSI=11
    -DMCP2515_MISO=13
    -DMCP2515_CS=10
    -DMCP2515_RST=9
    -DMCP2515_CLOCK=MCP_16MHZ
    -std=gnu++17
build_unflags = -std=gnu++11

monitor_speed = 115200

; LILYGO T-2CAN with the optional light WebUI compiled in.
; Same firmware as lilygo_t2can_arduino plus -DENABLE_LIGHT_WEBUI; the WebUI
; runs on its own low-priority task (core 0) and never enters the CAN fast path.
[env:lilygo_t2can_arduino_webui]
extends = env:lilygo_t2can_arduino

board_build.arduino.memory_type = qio_opi

build_flags =
    ${env:lilygo_t2can_arduino.build_flags}
    -DENABLE_LIGHT_WEBUI
    -DBOARD_HAS_PSRAM
    -DREC_CAP=100000

; Experimental CAN A full-frame recorder for finding unknown IDs such as
; 0x109 SBW_RQ_SCCM. The normal WebUI firmware above is unchanged.
[env:lilygo_t2can_cana_full_recorder]
extends = env:lilygo_t2can_arduino_webui

build_flags =
    ${env:lilygo_t2can_arduino_webui.build_flags}
    -DENABLE_CANA_FULL_RECORDER
    -DCANA_FULL_RECORDER_RX_BUDGET=160

; ---------------------------------------------------------------------------
; EXPERIMENT: BD bus on CAN1/TWAI (better timing than MCP2515) for 0x229 gear.
;   Wire Tesla X197/X179 pin 9/10 (BD CAN) -> board CAN1/TWAI (GPIO7/6).
;   Wire pin 13/14 (CH CAN) -> board CAN2/MCP2515 (unused here).
; All lighting/stalk/scroll-gear logic runs on TWAI; FSD/offset/preheat are
; NOT transmitted (this bus is BD, not CH). Test whether 0x229 scroll-gear
; injection works better via TWAI than via MCP2515.
; ---------------------------------------------------------------------------
[env:lilygo_t2can_bd_on_can1_webui]
extends = env:lilygo_t2can_arduino_webui

build_flags =
    ${env:lilygo_t2can_arduino_webui.build_flags}
    -DBD_ON_CAN1
