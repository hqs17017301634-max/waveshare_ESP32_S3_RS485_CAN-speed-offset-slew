; ESP32-FSD — CAN-only build for Waveshare ESP32-S3-RS485-CAN (16MB flash).
; No WiFi / Bluetooth / OTA / dashboard. Only stable CAN + FSD activation + speed control.

[platformio]
src_dir = ESP32S3CAN-FSD

[env:waveshare_ESP32_S3_RS485_CAN]
platform  = espressif32
board     = esp32s3box
framework = arduino

board_build.flash_size = 16MB
; Single-app, no-OTA partition table — radios/network features are stripped.
board_build.partitions = huge_app.csv

build_flags =
    -DTWAI_TX_PIN=GPIO_NUM_15
    -DTWAI_RX_PIN=GPIO_NUM_16
    -DPIN_LED=14
    -DTWAI_RX_QUEUE_LEN=64
    -DTWAI_TX_QUEUE_LEN=16
    -std=gnu++17
build_unflags = -std=gnu++11

monitor_speed = 115200
